<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Test Fix</title>
</head>
<body>
  <h1>Testing Fetch Fix...</h1>
  <pre id="result"></pre>
  
  <script>
    const API_URL = 'http://localhost:3000/api';
    
    // 保存原始 fetch (修复无限递归)
    const originalFetch = window.fetch;
    
    const fetchWithHeaders = (url, options = {}) => {
      const headers = {
        ...options.headers,
        'ngrok-skip-browser-warning': 'true',
        'User-Agent': 'A2A-Space-Client'
      };
      return originalFetch(url, { ...options, headers });
    };
    
    window.fetch = fetchWithHeaders;
    
    // 测试
    fetch(`${API_URL}/spaces`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('result').textContent = 
          'Success! ' + JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('result').textContent = 
          'Error: ' + err.message;
      });
  </script>
</body>
</html>
