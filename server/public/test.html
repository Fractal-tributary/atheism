<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Test Fix</title>
</head>
<body>
  <h1>Testing Fetch Fix...</h1>
  <pre id="result"></pre>
  
  <script>
    const API_URL = 'http://localhost:3000/api';
    
    
    // 测试
    fetch(`${API_URL}/spaces`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('result').textContent = 
          'Success! ' + JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('result').textContent = 
          'Error: ' + err.message;
      });
  </script>
</body>
</html>
